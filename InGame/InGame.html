<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="d2aa-version" content="ingame-0.31-options-polish" />
<title>D2AA In-Game Prototype</title>
<script>
window.D2AA_VERSION='ingame-0.31-options-polish';
window.D2AA_BUNGIE_REDIRECT_URI='https://erebusares.github.io/D2AA/InGame/InGame.html';
window.D2AA_DISABLE_DIM_CONTROLS=true;
window.D2AA_ASSET_STAMP=Date.now().toString(36);
document.write(`<link rel="stylesheet" href="./ingame.css?t=${window.D2AA_ASSET_STAMP}" />`);
document.write(`<link rel="stylesheet" href="./tier-colors.css?t=${window.D2AA_ASSET_STAMP}" />`);
document.write(`<link rel="stylesheet" href="./ingame-overrides.css?t=${window.D2AA_ASSET_STAMP}" />`);
</script>
<style>
/* Options panel polish lives here so we keep editing existing site files without adding another stylesheet. */
.side-panel{padding:16px;background:linear-gradient(180deg,rgba(13,16,22,.98),rgba(7,9,13,.98));}
.panel-card{position:relative;overflow:hidden;border:1px solid rgba(216,180,91,.18);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.028));box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 12px 30px rgba(0,0,0,.22);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.panel-card::before{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,rgba(216,180,91,.45),transparent);pointer-events:none}.panel-card h2{display:flex;align-items:center;gap:8px;margin-bottom:14px;color:#f0cf74;text-shadow:0 0 12px rgba(216,180,91,.18)}.panel-card h2::before{content:"◆";font-size:9px;color:var(--gold)}
.action-card{position:relative;grid-template-columns:32px 1fr;border-color:rgba(255,255,255,.14);background:linear-gradient(90deg,rgba(216,180,91,.10),rgba(255,255,255,.045));box-shadow:inset 0 1px 0 rgba(255,255,255,.06);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);transition:border-color .14s ease,background .14s ease,transform .14s ease}.action-card:hover{border-color:rgba(216,180,91,.48);background:linear-gradient(90deg,rgba(216,180,91,.18),rgba(255,255,255,.06));transform:translateX(2px)}.action-card span{display:grid;place-items:center;width:26px;height:26px;border:1px solid rgba(216,180,91,.32);background:rgba(0,0,0,.25);font-weight:900}.action-card b{font-size:13px}.action-card small{font-size:12px}.action-card--danger{background:linear-gradient(90deg,rgba(217,97,97,.10),rgba(255,255,255,.04))}.action-card--danger span{border-color:rgba(217,97,97,.34);color:#ff8f8f}.action-card--danger:hover{border-color:rgba(217,97,97,.55);background:linear-gradient(90deg,rgba(217,97,97,.16),rgba(255,255,255,.05))}
.panel-card .control-field{display:grid;gap:6px;margin:12px 0}.panel-card .control-field>span,.panel-card .display-list>span{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:#8f98a8}.panel-card select{height:34px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,#171b23,#0b0e13);color:#f1f3f6;padding:0 34px 0 10px;border-radius:0;outline:none;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);accent-color:var(--gold)}.panel-card select:focus{border-color:rgba(216,180,91,.64);box-shadow:0 0 0 1px rgba(216,180,91,.2),inset 0 1px 0 rgba(255,255,255,.08)}.panel-card select option{background:#11151c;color:#f1f3f6}.panel-card input[type=range]{height:18px;accent-color:var(--gold);filter:drop-shadow(0 0 8px rgba(216,180,91,.18))}.range-line{display:flex;align-items:center;justify-content:space-between;gap:10px}.range-line strong{min-width:38px;text-align:right;color:#f0cf74;font-variant-numeric:tabular-nums}.display-list{display:grid;gap:8px;margin-top:2px}.display-toggle{display:grid!important;grid-template-columns:1fr auto!important;gap:12px!important;align-items:center!important;margin:0!important;padding:9px 10px!important;border:1px solid rgba(255,255,255,.11);background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,255,255,.025));clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);cursor:pointer;transition:border-color .14s ease,background .14s ease}.display-toggle:hover{border-color:rgba(216,180,91,.38);background:linear-gradient(90deg,rgba(216,180,91,.10),rgba(255,255,255,.035))}.display-toggle span{font-size:13px;color:#c6cedb}.display-toggle input{appearance:none;-webkit-appearance:none;width:34px;height:18px;margin:0;border:1px solid rgba(255,255,255,.24);background:#080a0e;position:relative;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);box-shadow:inset 0 1px 4px rgba(0,0,0,.55)}.display-toggle input::after{content:"";position:absolute;left:3px;top:3px;width:10px;height:10px;background:#68717e;box-shadow:0 0 0 1px rgba(255,255,255,.12);transition:transform .14s ease,background .14s ease,box-shadow .14s ease}.display-toggle input:checked{border-color:rgba(216,180,91,.58);background:linear-gradient(90deg,rgba(216,180,91,.34),rgba(216,180,91,.12))}.display-toggle input:checked::after{transform:translateX(17px);background:#f0cf74;box-shadow:0 0 12px rgba(216,180,91,.65)}.display-toggle input:focus-visible{outline:1px solid var(--gold);outline-offset:3px}
</style>
</head>
<body data-theme="ingame">
<div class="app-shell">
  <header class="command-bar">
    <button type="button" class="gear-button" id="menuBtn" aria-label="Options" aria-expanded="false" aria-controls="commandPanel">⚙</button>
    <div class="live-chip" id="liveChip" title="Live feed status"><span></span>Live</div>
    <div class="brand-lockup"><span class="brand-diamond">◆</span><div><strong>D2 Armor Analyzer</strong><span id="statusText">Ready</span></div></div>
    <nav class="class-toggle" id="classToggle" aria-label="Class filter">
      <button type="button" data-class-filter="Warlock">Warlock <b>0</b></button>
      <button type="button" data-class-filter="Hunter">Hunter <b>0</b></button>
      <button type="button" data-class-filter="Titan">Titan <b>0</b></button>
    </nav>
    <label class="search-wrap" for="searchBox"><span>Search</span><input id="searchBox" type="search" placeholder="Armor name, slot, tag, group..." autocomplete="off" /></label>
    <button type="button" id="bungieLoginBtn" class="command-button command-button--gold" title="Sign in with Bungie"><span class="bungie-mark" aria-hidden="true"><img src="https://www.bungie.net/favicon.ico" alt="" loading="lazy" style="filter:brightness(0) invert(1) contrast(1.25) drop-shadow(0 0 8px rgba(255,255,255,.35)) !important; opacity:1 !important;"></span><b>Sign In</b><small>Bungie</small></button>
    <button type="button" id="bungieSyncBtn" class="command-button" title="Manual Bungie armor sync"><span>↓</span><b>Sync Armor</b><small>Full inventory</small></button>
  </header>

  <aside class="side-panel" id="commandPanel" aria-label="Options panel">
    <section class="panel-card">
      <h2>Options</h2>
      <button type="button" class="action-card" id="restoreCacheBtn"><span>↻</span><b>Restore Cache</b><small>Load locally cached rows</small></button>
      <button type="button" class="action-card action-card--danger" id="clearCacheBtn"><span>×</span><b>Clear Cache</b><small>Keep tags and dismissed feed state</small></button>
      <input id="csvFile" type="file" accept=".csv" hidden />
      <button type="button" class="action-card is-hidden" id="uploadCsvBtn"><span>⇧</span><b>Upload DIM CSV</b><small>Hidden in this prototype</small></button>
    </section>
    <section class="panel-card">
      <h2>Filters</h2>
      <label class="control-field"><span>Class</span><select id="classFilter"><option value="Warlock">Warlock</option><option value="Hunter">Hunter</option><option value="Titan">Titan</option></select></label>
      <label class="control-field"><span>Slot</span><select id="slotFilter"><option value="all">All slots</option></select></label>
      <label class="control-field"><span>Rarity</span><select id="rarityFilter"><option value="all">All rarity</option></select></label>
      <label class="control-field"><span>Sort</span><select id="sortBy"><option value="default">Default analyzer order</option><option value="totalDesc">Best Base Total</option><option value="currentTotalDesc">Best Current Total</option><option value="powerDesc">Highest Power</option><option value="tierDesc">Highest Tier</option><option value="newestDesc">Newest</option><option value="groupedFirst">Grouped First</option><option value="untaggedFirst">Untagged First</option><option value="nameAsc">Name A to Z</option><option value="slotAsc">Slot order</option></select></label>
      <div class="control-field"><span>Duplicate tolerance</span><div class="range-line"><input id="duplicateTolerance" type="range" min="0" max="20" value="5" /><strong id="duplicateToleranceOut">±5</strong></div></div>
    </section>
    <section class="panel-card">
      <h2>Display</h2>
      <div class="display-list">
        <label class="display-toggle"><span>Show equipped</span><input id="showEquipped" type="checkbox" checked /></label>
        <label class="display-toggle"><span>Show vaulted</span><input id="showVault" type="checkbox" checked /></label>
        <label class="display-toggle"><span>Show inventory</span><input id="showInventory" type="checkbox" checked /></label>
        <label class="display-toggle"><span>Show locked</span><input id="showLocked" type="checkbox" checked /></label>
        <label class="display-toggle"><span>Only new items</span><input id="onlyNewItems" type="checkbox" /></label>
        <label class="display-toggle"><span>Only grouped items</span><input id="onlyGroupedItems" type="checkbox" /></label>
      </div>
    </section>
  </aside>

  <main class="workspace" id="workspace">
    <div class="active-chips" id="activeChips"></div>
    <section id="gridView" class="slot-board"></section>
    <section id="tableView" hidden></section>
    <table hidden><tbody id="tableBody"></tbody></table>
    <div id="emptyState" class="empty-state"><h2>No armor loaded yet.</h2><p>Sign in with Bungie, then Sync Armor. This prototype is Bungie-first and keeps the DIM CSV path hidden.</p></div>
  </main>

  <aside class="item-feed is-open" id="itemFeed">
    <button type="button" class="feed-tab" id="feedToggle">Item Feed</button>
    <div class="feed-shell"><div class="feed-head"><strong>Latest Items</strong><span id="feedCount">0</span><button type="button" id="refreshBtn" class="feed-refresh-button" title="Check latest drops now" aria-label="Check latest drops now"><span aria-hidden="true">↻</span></button></div><div class="feed-list" id="feedList"></div></div>
  </aside>
</div>
<script type="module">
const assetStamp=window.D2AA_ASSET_STAMP||Date.now().toString(36);
await import(`./ingame.js?t=${assetStamp}`);
await import(`./ingame-fixes.js?t=${assetStamp}`);
await import(`./stable-dom-fixes.js?t=${assetStamp}`);
await import(`./status-line.js?t=${assetStamp}`);
await import(`../src-clean/bungie-wire.js?t=${assetStamp}`);
</script>
</body>
</html>
